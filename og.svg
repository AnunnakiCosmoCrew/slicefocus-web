    <path d="M 704.7 786.7 A 340 340 0 0 1 319.3 783.5 L 395.6 663.1 A 210 210 0 0 0 625.8 668.0 Z" fill="#4A8C6F"/>
    <path d="M 302.5 769.0 A 340 340 0 0 1 165.3 456.4 L 305.2 475.8 A 210 210 0 0 0 385.5 660.4 Z" fill="#A67C52"/>
    <path d="M 168.3 438.1 A 340 340 0 0 1 505.9 172.1 L 508.5 302.1 A 210 210 0 0 0 311.0 459.9 Z" fill="#B8C9A3"/>
    <circle cx="512" cy="512" r="208" fill="#fffdf8"/>
