<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <!-- Open Graph card — minimal cream, wordmark + positioning + the radial mark.
       Source for og.png (rasterized with rsvg-convert). ADR-042: minimal & sincere. -->
  <rect width="1200" height="630" fill="#f7f3eb"/>

  <!-- Text block (left) -->
  <text x="96" y="278" font-family="Iowan Old Style, Palatino, Georgia, serif"
        font-size="104" font-weight="600" fill="#21201b" letter-spacing="-1.5">SliceFocus</text>
  <text x="100" y="356" font-family="Iowan Old Style, Palatino, Georgia, serif"
        font-size="40" fill="#4a443a">Plan your day on a clock.</text>
  <text x="100" y="408" font-family="Iowan Old Style, Palatino, Georgia, serif"
        font-size="40" fill="#4a443a">It runs itself.</text>
  <rect x="102" y="452" width="116" height="6" rx="3" fill="#bf5b3e"/>
  <text x="100" y="556" font-family="-apple-system, Helvetica, Arial, sans-serif"
        font-size="26" fill="#6f685b">A visual day planner with zero-touch auto-advance.</text>

  <!-- Radial mark (right) — the app's forest-palette donut, no icon tile. -->
  <g transform="translate(742,79) scale(0.46)">
    <path d="M 518.1 172.1 A 340 340 0 0 1 851.4 505.9 L 716.7 503.5 A 210 210 0 0 0 513.7 302.1 Z" fill="#2D4A3E"/>
